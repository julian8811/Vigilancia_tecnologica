app = "vigilagraph-api"

[build]
  dockerfile = "infra/docker/fly.Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/ready"
    interval = "30s"
    timeout = "5s"
