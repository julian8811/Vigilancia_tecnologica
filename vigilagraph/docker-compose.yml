version: "3.9"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  vigilagraph:
    name: vigilagraph
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  storage_data:

services:
  # ── PostgreSQL 16 + pgvector ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:0.7.4-pg16
    restart: unless-stopped
    networks: [vigilagraph]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vigilagraph
      POSTGRES_PASSWORD: vigilagraph
      POSTGRES_DB: vigilagraph
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigilagraph -d vigilagraph"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Redis 7 ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [vigilagraph]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ── MinIO (S3-compatible storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [vigilagraph]
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── FastAPI Backend ──────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [vigilagraph]
    ports:
      - "8000:8000"
    env_file:
      - local.env
    environment:
      ENV: ${ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vigilagraph:vigilagraph@postgres:5432/vigilagraph}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
    volumes:
      - storage_data:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    logging: *default-logging

  # ── Celery Worker ────────────────────────────────────────────────
  worker:
    build:
      context: ./apps
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    networks: [vigilagraph]
    env_file:
      - local.env
    environment:
      ENV: ${ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vigilagraph:vigilagraph@postgres:5432/vigilagraph}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
    volumes:
      - storage_data:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["celery", "-A", "worker.app", "worker", "-l", "info", "--concurrency=1"]
    logging: *default-logging

  # ── Next.js Frontend ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [vigilagraph]
    ports:
      - "3000:3000"
    env_file:
      - local.env
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:8000}
      NEXT_PUBLIC_FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - api
    logging: *default-logging
