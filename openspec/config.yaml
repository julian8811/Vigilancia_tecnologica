# OpenSpec Configuration — VigilaGraph IA
project: VigilaGraph IA
repo: vigilancia
created: 2026-06-18
updated: 2026-06-21
artifact_store: hybrid

context: |
  VigilaGraph IA — AI-powered technology surveillance analysis platform.
  Python/FastAPI backend with SQLAlchemy 2 + Alembic, Celery + Redis task queue.
  Next.js 14 (App Router) frontend with TypeScript, shadcn/ui, TanStack Query,
  Cytoscape.js for graph visualization. PostgreSQL + pgvector for embeddings,
  MinIO/Railway Buckets for S3-compatible object storage. Deployed on Railway.app.
  Monorepo layout under viglagraph/ with apps/api/, apps/web/, apps/worker/.

stack:
  backend:
    language: Python 3.12+
    framework: FastAPI (Mangum-compatible)
    orm: SQLAlchemy 2 + Alembic
    validation: Pydantic v2
    task_queue: Celery + Redis/Valkey
  frontend:
    framework: Next.js 14 (App Router)
    language: TypeScript 5.x
    styling: Tailwind CSS 3 + tailwindcss-animate
    ui_library: shadcn/ui (Radix primitives)
    forms: React Hook Form + Zod
    state_query: TanStack Query + TanStack Table
    graph: Cytoscape.js + cytoscape-dagre
    icons: Lucide React
    toast: Sonner
  database:
    primary: PostgreSQL
    vector: pgvector
    cache_queue: Redis/Valkey
    storage: MinIO / Railway Buckets (S3-compatible)
  infrastructure:
    platform: Railway.app
    ci: GitHub Actions (ruff, mypy, tsc, pytest, vitest, Playwright)
    pre_commit: ruff, ruff-format, mypy, tsc, vitest
    graph_tool: Graphify (uv tool install graphifyy)

testing:
  strict_tdd: true
  reason: "All test layers detected: pytest + pytest-asyncio + httpx (backend unit/integration), Vitest + @testing-library/react + happy-dom (frontend unit/integration), Playwright (E2E). Pre-commit hooks enforce test run and type checking."
  capabilities:
    backend:
      runner: pytest + pytest-asyncio
      coverage: pytest-cov
      layers:
        unit: true
        integration: true
        e2e: false
    frontend:
      runner: Vitest + Testing Library
      coverage: vitest --coverage (not yet configured)
      e2e: Playwright
      layers:
        unit: true
        integration: true
        e2e: true

strict_tdd: true

phase_rules:
  proposal:
    require_approval: true
  spec:
    require_approval: true
  design:
    require_approval: true
  tasks:
    require_approval: false
  apply:
    require_approval: false
  verify:
    require_approval: false
  archive:
    require_approval: false
